<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docker Sensore Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --border: #1f2937;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 2rem;
    }

    p.lead {
      color: var(--muted);
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .value {
      font-size: 1.1rem;
      font-weight: bold;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .dot.error {
      background: var(--danger);
    }

    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .history-list li {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      color: #d1d5db;
    }

    .history-list li:last-child {
      border-bottom: none;
    }

    .footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    code {
      background: #0b1220;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Docker Sensore Dashboard</h1>
    <p class="lead">
      Frontend separato con Nginx, API Flask e Redis in Docker Compose.
    </p>

    <div class="grid">
      <section class="card">
        <div class="label">Ultima lettura</div>
        <div id="last-reading" class="value">Caricamento...</div>
        <div class="status">
          <span id="status-dot" class="dot"></span>
          <span id="status-text">API raggiungibile</span>
        </div>
      </section>

      <section class="card">
        <div class="label">Endpoint monitorati</div>
        <div class="value">
          <div><code>/api/last-reading</code></div>
          <div><code>/api/history</code></div>
        </div>
      </section>
    </div>

    <section class="card" style="margin-top: 20px;">
      <div class="label">Storico ultime letture</div>
      <ul id="history-list" class="history-list">
        <li>Caricamento...</li>
      </ul>
    </section>

    <div class="footer">
      Aggiornamento automatico ogni 3 secondi.
    </div>
  </div>

  <script>
    async function loadData() {
      const lastReadingEl = document.getElementById('last-reading');
      const historyListEl = document.getElementById('history-list');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');

      try {
        const [lastRes, historyRes] = await Promise.all([
          fetch('/api/last-reading'),
          fetch('/api/history')
        ]);

        if (!lastRes.ok || !historyRes.ok) {
          throw new Error('API non disponibile');
        }

        const lastData = await lastRes.json();
        const historyData = await historyRes.json();

        lastReadingEl.textContent = lastData.ultima_lettura || 'Nessun dato disponibile';

        historyListEl.innerHTML = '';
        const readings = historyData.storico_letture || [];

        if (readings.length === 0) {
          historyListEl.innerHTML = '<li>Nessuna lettura disponibile</li>';
        } else {
          readings.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            historyListEl.appendChild(li);
          });
        }

        statusDot.classList.remove('error');
        statusText.textContent = 'API raggiungibile';
      } catch (error) {
        lastReadingEl.textContent = 'Errore nel recupero dati';
        historyListEl.innerHTML = '<li>Impossibile caricare lo storico</li>';
        statusDot.classList.add('error');
        statusText.textContent = 'API non raggiungibile';
      }
    }

    loadData();
    setInterval(loadData, 3000);
  </script>
</body>
</html>
